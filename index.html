// ─────────────────────────────────────────────────────────────
// Activity filter — logistical stops don't count
// ─────────────────────────────────────────────────────────────
function isActivity(stop) {
  if (!stop) return false;
  if (stop.category === 'Departure') return false;
  if (stop.category === 'Free Time') return false;
  return true;
}
function countActivities(day) {
  return day.stops.filter(isActivity).length;
}
const TOTAL_ACTIVITIES = DAYS.reduce((n, d) => n + countActivities(d), 0);

function Rule({ color = VA.rule, margin = '16px 0' }) {
  return <div style={{ height: 1, background: color, margin }} />;

function getTripDay() {
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const start = new Date(2026, 6, 24); // July 24, 2026 (month is 0-indexed)
  const diffDays = Math.round((today - start) / (24 * 60 * 60 * 1000));
  if (diffDays < 0) return { day: 1, phase: 'before', daysUntil: -diffDays };
  if (diffDays > 7) return { day: 8, phase: 'after' };
  return { day: diffDays + 1, phase: 'during' };
}

          }}>

function DayScreen({ dayId, onDay, onStop, onBack }) {
  const idx = DAYS.findIndex(d => d.id === dayId);
  const day = DAYS[idx];
  const prev = DAYS[idx - 1];
  const next = DAYS[idx + 1];

  const [touchStart, setTouchStart] = useState(null);
  const [dragX, setDragX] = useState(0);

  const onTouchStart = (e) => setTouchStart(e.touches[0].clientX);
  const onTouchMove = (e) => {
    if (touchStart === null) return;
    setDragX(e.touches[0].clientX - touchStart);
  };
  const onTouchEnd = () => {
    if (dragX < -60 && next) onDay(next.id);
    else if (dragX > 60 && prev) onDay(prev.id);
    setTouchStart(null);
    setDragX(0);
  };

  return (
    <div style={{ background: VA.paper, minHeight: '100%', paddingBottom: 100 }}
         onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}>
      <div style={{
        position: 'relative', height: 320,
        backgroundImage: `linear-gradient(180deg, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0) 30%, rgba(0,0,0,0.7) 100%), url(${day.hero})`,
        backgroundSize: 'cover', backgroundPosition: 'center',
        transform: `translateX(${dragX * 0.3}px)`,
        transition: touchStart === null ? 'transform 0.3s ease' : 'none',
      }}>
        <TopStatusSpacer />
        <div style={{ padding: '8px 20px', display: 'flex', justifyContent: 'space-between' }}>
          <button onClick={onBack} style={{
            border: 0, background: 'rgba(255,255,255,0.2)', backdropFilter: 'blur(8px)',
            color: VA.paper, fontFamily: mono, fontSize: 10, letterSpacing: 1.5,
            textTransform: 'uppercase', padding: '8px 12px', cursor: 'pointer',
          }}>← All Days</button>
          <div style={{
            background: 'rgba(255,255,255,0.2)', backdropFilter: 'blur(8px)',
            color: VA.paper, fontFamily: mono, fontSize: 10, letterSpacing: 1.5,
            padding: '8px 12px',
          }}>{String(day.id).padStart(2, '0')} / {TRIP_META.totalDays}</div>
        </div>
        <div style={{ position: 'absolute', bottom: 24, left: 24, right: 24, color: VA.paper }}>
          <div style={{
            fontFamily: serif, fontSize: 72, fontWeight: 700, lineHeight: 0.9,
            letterSpacing: -2.2, textShadow: '0 2px 20px rgba(0,0,0,0.35)',
          }}>Day {day.id}</div>
          <div style={{
            fontFamily: mono, fontSize: 11, letterSpacing: 2, textTransform: 'uppercase',
            marginTop: 10, opacity: 0.9,
          }}>{day.fullDate}</div>
          <div style={{
            fontFamily: serif, fontSize: 28, fontWeight: 600, lineHeight: 1.05,
            marginTop: 8, letterSpacing: -0.5,
          }}>{day.city}</div>
          <div style={{
            fontFamily: serif, fontStyle: 'italic', fontSize: 16, marginTop: 4, opacity: 0.95,
          }}>{day.subtitle}</div>
        </div>
      </div>

      <div style={{
        padding: '14px 24px', display: 'flex', justifyContent: 'space-between',
        alignItems: 'center', borderBottom: `1px solid ${VA.rule}`,
      }}>
        <button onClick={() => prev && onDay(prev.id)} disabled={!prev} style={{
          background: 'none', border: 0, cursor: prev ? 'pointer' : 'default',
          fontFamily: mono, fontSize: 10, letterSpacing: 1.5, textTransform: 'uppercase',
          color: prev ? VA.inkSoft : VA.rule, padding: 0,
        }}>{prev ? `← Day ${prev.id}` : '—'}</button>
        <button onClick={() => next && onDay(next.id)} disabled={!next} style={{
          background: 'none', border: 0, cursor: next ? 'pointer' : 'default',
          fontFamily: mono, fontSize: 10, letterSpacing: 1.5, textTransform: 'uppercase',
          color: next ? VA.inkSoft : VA.rule, padding: 0,
        }}>{next ? `Day ${next.id} →` : '—'}</button>
      </div>

      <div style={{
        padding: '14px 24px', background: VA.cream, display: 'flex', gap: 10, alignItems: 'center',
      }}>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M3 21V7l9-4 9 4v14M9 9h6M9 13h6M9 17h6" stroke={VA.forest} strokeWidth="1.5" strokeLinecap="round"/>
        </svg>
        <div>
          <div style={{ fontFamily: mono, fontSize: 9, color: VA.inkMuted, letterSpacing: 1.3, textTransform: 'uppercase' }}>
            Home Port
          </div>
          <div style={{ fontFamily: sans, fontSize: 13, color: VA.ink, marginTop: 1 }}>
            {day.lodging}
          </div>
        </div>
      </div>

      <div style={{ padding: '28px 24px 0' }}>
        <Eyebrow>The Schedule</Eyebrow>
        <h2 style={{
          fontFamily: serif, fontSize: 26, fontWeight: 600, letterSpacing: -0.3,
          margin: '6px 0 20px', color: VA.ink,
        }}>{countActivities(day)} activities today</h2>
      </div>

      <div style={{ padding: '0 24px' }}>
        {day.stops.map((s, i) => (
          <StopRow key={s.id} stop={s} last={i === day.stops.length - 1} onClick={() => onStop(s.id, day.id)} />
        ))}
      </div>
    </div>
  );
}

  const day = DAYS.find(d => d.id === dayId);
  const stop = day.stops.find(s => s.id === stopId);
  const stopIdx = day.stops.findIndex(s => s.id === stopId);
  const prevStop = day.stops[stopIdx - 1];
  const nextStop = day.stops[stopIdx + 1];

  return (
    <div style={{ background: VA.paper, minHeight: '100%', paddingBottom: 100 }}>
      <div style={{
        position: 'relative', height: 460,
        backgroundImage: `linear-gradient(180deg, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0) 35%, rgba(0,0,0,0.6) 100%), url(${stop.image})`,
        backgroundSize: 'cover', backgroundPosition: 'center',
      }}>
        <TopStatusSpacer />
        <div style={{ padding: '8px 20px', display: 'flex', justifyContent: 'space-between' }}>
          <button onClick={() => onBack()} style={{
            border: 0, background: 'rgba(255,255,255,0.2)', backdropFilter: 'blur(8px)',
            color: VA.paper, fontFamily: mono, fontSize: 10, letterSpacing: 1.5,
            textTransform: 'uppercase', padding: '8px 12px', cursor: 'pointer',
          }}>← {day.city}</button>
        </div>
        <div style={{ position: 'absolute', bottom: 28, left: 24, right: 24, color: VA.paper }}>
          <div style={{ marginBottom: 12 }}>
            <span style={{
              display: 'inline-block', padding: '4px 10px', background: VA.terracotta,
              fontFamily: mono, fontSize: 9, letterSpacing: 1.5, textTransform: 'uppercase',
              fontWeight: 500,
            }}>{stop.category}</span>
          </div>
          <div style={{
            fontFamily: serif, fontSize: 48, fontWeight: 700, lineHeight: 0.98,
            letterSpacing: -1.2, textShadow: '0 2px 20px rgba(0,0,0,0.3)',
          }}>{stop.title}</div>
          <div style={{
            marginTop: 14, display: 'flex', gap: 16, alignItems: 'center',
            fontFamily: mono, fontSize: 10, letterSpacing: 1.4, textTransform: 'uppercase',
            opacity: 0.95,
          }}>
            <span>Activity {stopIdx + 1} of {day.stops.length}</span>
            <span>·</span>
            <span>{stop.time}</span>
          </div>
        </div>
      </div>

      <div style={{
        display: 'grid',
        gridTemplateColumns: stop.cost && stop.duration ? '1fr 1fr 1fr' : '1fr 1fr',
        borderBottom: `1px solid ${VA.rule}`,
      }}>
        <MetaCell label="Time" value={stop.time} />
        {stop.duration && <MetaCell label="Duration" value={stop.duration} />}
        {stop.cost && <MetaCell label="Cost" value={stop.cost} />}
      </div>

      {stop.tentative && stop.tentativeNote && (
        <div style={{
          background: VA.terracotta, color: VA.paper, padding: '14px 24px',
          display: 'flex', gap: 12, alignItems: 'baseline',
        }}>
          <span style={{
            fontFamily: mono, fontSize: 9, letterSpacing: 1.5, textTransform: 'uppercase',
            fontWeight: 600, whiteSpace: 'nowrap',
          }}>Either / Or</span>
          <span style={{ fontFamily: sans, fontSize: 13, lineHeight: 1.4 }}>{stop.tentativeNote}</span>
        </div>
      )}

      <div style={{ padding: '32px 24px 8px' }}>
        <Eyebrow>Why It Matters</Eyebrow>
        <h2 style={{
          fontFamily: serif, fontSize: 28, fontWeight: 600, lineHeight: 1.1,
          letterSpacing: -0.4, margin: '10px 0 20px', color: VA.ink,
        }}>The story behind the stop</h2>

        <div style={{
          fontFamily: serif, fontSize: 17, lineHeight: 1.55, color: VA.ink,
        }}>
          <span style={{
            fontFamily: serif, fontSize: 64, fontWeight: 700, float: 'left',
            lineHeight: 0.85, paddingRight: 10, paddingTop: 6, color: VA.terracotta,
          }}>{stop.why.charAt(0)}</span>
          {stop.why.slice(1)}

      </div>

      {stop.facts && stop.facts.length > 0 && (
        <>
          <div style={{ padding: '32px 24px 0' }}>
            <Rule />
          </div>
          <div style={{ padding: '20px 24px 0' }}>

              fontFamily: serif, fontSize: 22, fontWeight: 600, lineHeight: 1.15,
              margin: '8px 0 18px', color: VA.ink, letterSpacing: -0.2,

              <div key={i} style={{
                display: 'grid', gridTemplateColumns: '28px 1fr', gap: 8,
                padding: '14px 0',

                }}>{f}</div>
              </div>

          </div>
        </>

      {(stop.address || stop.phone || stop.hours) && (
        <div style={{ padding: '28px 24px 0' }}>
          <Eyebrow color={VA.forest}>Practical</Eyebrow>

            background: VA.cream, padding: '18px 18px',

            {stop.hours && <InfoRow label="Hours" value={stop.hours} />}
            {stop.phone && <InfoRow label="Phone" value={stop.phone} />}

          <button onClick={() => {
            const query = stop.mapQuery
              ? stop.mapQuery
              : stop.address
              ? `${stop.title}, ${stop.address}`

              `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(query)}`,
              '_blank', 'noopener,noreferrer'

            marginTop: 16, width: '100%', padding: '14px',

            letterSpacing: 2, textTransform: 'uppercase', fontWeight: 500,

      )}

      <div style={{ padding: '36px 24px 24px' }}>
        <Rule />
        <div style={{
          display: 'flex', justifyContent: 'space-between', alignItems: 'center',
          paddingTop: 18, gap: 12,

          <StopNav dir="prev" stop={prevStop} onClick={() => prevStop && onBack(prevStop.id)} />
          <StopNav dir="next" stop={nextStop} onClick={() => nextStop && onBack(nextStop.id)} />
        </div>
      </div>
    </div>
  );
}

}

function StopNav({ dir, stop, onClick }) {
  if (!stop) return <div style={{ flex: 1 }} />;
  return (
    <button onClick={onClick} style={{
      flex: 1, background: 'none', border: 0, cursor: 'pointer', padding: 0,
      textAlign: dir === 'prev' ? 'left' : 'right',
    }}>
      <div style={{
        fontFamily: mono, fontSize: 9, color: VA.inkMuted, letterSpacing: 1.3,
        textTransform: 'uppercase',
      }}>{dir === 'prev' ? '← Previous' : 'Next →'}</div>
      <div style={{
        fontFamily: serif, fontSize: 17, fontWeight: 600, color: VA.ink,
        marginTop: 4, letterSpacing: -0.1, lineHeight: 1.15,
      }}>{stop.title}</div>
    </button>
  );
}

// ─────────────────────────────────────────────────────────────
// Activities screen — all real activities across the trip
// ─────────────────────────────────────────────────────────────
function ActivitiesScreen({ onStop }) {

      <TopStatusSpacer />
      <div style={{ padding: '12px 24px 20px' }}>
        <Eyebrow>All Activities</Eyebrow>
        <h1 style={{
          fontFamily: serif, fontSize: 44, fontWeight: 700, lineHeight: 0.95,
          margin: '10px 0 0', letterSpacing: -1, color: VA.ink,
        }}>Every stop<br/>worth stopping for</h1>
        <p style={{
          fontFamily: serif, fontStyle: 'italic', fontSize: 15, color: VA.inkSoft,
          margin: '12px 0 0', lineHeight: 1.45,
        }}>
          {TOTAL_ACTIVITIES} activities across the week — a welcome cookout, the Saturday street market, a Fireflies game, a state-park picnic, theme-park thrills, go-karts, trampolines, and pool & game nights at the Port of Call.
        </p>
      </div>

      {DAYS.map(d => {
        const acts = d.stops.filter(isActivity);
        if (acts.length === 0) return null;
        return (
          <div key={d.id}>
            <div style={{
              padding: '16px 24px 14px', background: VA.cream,
              borderTop: `1px solid ${VA.rule}`, borderBottom: `1px solid ${VA.rule}`,
              display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', gap: 12,
            }}>
              <div>
                <div style={{
                  fontFamily: mono, fontSize: 10, color: VA.terracotta,
                  letterSpacing: 1.5, fontWeight: 500,
                }}>DAY {d.id} · {d.date.toUpperCase()}</div>
                <div style={{
                  fontFamily: serif, fontSize: 22, fontWeight: 600, color: VA.ink,
                  marginTop: 4, letterSpacing: -0.2, lineHeight: 1.1,
                }}>{d.city}</div>
              </div>
              <div style={{
                fontFamily: mono, fontSize: 10, color: VA.inkMuted, letterSpacing: 1.2,
                textTransform: 'uppercase',
              }}>{acts.length} {acts.length === 1 ? 'activity' : 'activities'}</div>
            </div>
            {acts.map((s, i) => (
              <button key={s.id} onClick={() => onStop(s.id, d.id)} style={{
                display: 'grid', gridTemplateColumns: '72px 1fr auto', gap: 14,
                width: '100%', padding: '14px 24px', border: 0, background: 'none',
                cursor: 'pointer', textAlign: 'left',
                borderBottom: i === acts.length - 1 ? 'none' : `1px solid ${VA.rule}`,
                alignItems: 'center',
              }}>
                <div style={{
                  width: 72, height: 72, backgroundImage: `url(${s.image})`,
                  backgroundSize: 'cover', backgroundPosition: 'center',
                }} />
                <div>
                  <div style={{ display: 'flex', gap: 8, alignItems: 'center', flexWrap: 'wrap' }}>
                    <span style={{
                      fontFamily: mono, fontSize: 10, color: VA.ink,
                      fontWeight: 600, letterSpacing: 0.5,
                    }}>{s.time}</span>
                    <Tag bg={VA.forest}>{s.category}</Tag>
                  </div>
                  <div style={{
                    fontFamily: serif, fontSize: 17, fontWeight: 600, color: VA.ink,
                    marginTop: 5, letterSpacing: -0.2, lineHeight: 1.15,
                  }}>{s.title}</div>
                  {(s.short || s.why) && (
                    <p style={{
                      fontFamily: sans, fontSize: 12, color: VA.inkSoft, lineHeight: 1.4,
                      margin: '4px 0 0',
                    }}>
                      {s.short || s.why.slice(0, 78) + (s.why.length > 78 ? '…' : '')}
                    </p>
                  )}
                </div>
                <div style={{
                  fontFamily: serif, fontSize: 20, color: VA.ink, alignSelf: 'center',
                }}>→</div>
              </button>
            ))}
          </div>
        );
      })}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// App with routing
// ─────────────────────────────────────────────────────────────
function App() {
  const [route, setRoute] = useState(() => {
    try { return JSON.parse(localStorage.getItem('cola-route')) || { screen: 'home' }; }
    catch { return { screen: 'home' }; }
  });

  useEffect(() => {
    localStorage.setItem('cola-route', JSON.stringify(route));
    window.scrollTo(0, 0);
  }, [route]);

  const goHome = () => setRoute({ screen: 'home' });
  const goItin = () => setRoute({ screen: 'itinerary' });
  const goActs = () => setRoute({ screen: 'activities' });
  const goMap  = () => setRoute({ screen: 'map' });
  const goDay  = (id) => setRoute({ screen: 'day', dayId: id });
  const goStop = (sid, did) => setRoute({ screen: 'stop', stopId: sid, dayId: did });
  const onTab = (t) => {
    if (t === 'home') goHome();
    if (t === 'itinerary') goItin();
    if (t === 'activities') goActs();
    if (t === 'map') goMap();
  };

  const activeTab = route.screen === 'home' ? 'home'
    : route.screen === 'activities' ? 'activities'
    : route.screen === 'map' ? 'map'
    : 'itinerary';

  let screen;
  if (route.screen === 'home') screen = <HomeScreen onDay={goDay} onTab={onTab} />;
  else if (route.screen === 'itinerary') screen = <ItineraryScreen onDay={goDay} />;
  else if (route.screen === 'activities') screen = <ActivitiesScreen onStop={goStop} />;
  else if (route.screen === 'map') screen = <MapScreen />;
  else if (route.screen === 'day') screen = <DayScreen dayId={route.dayId} onDay={goDay} onStop={goStop} onBack={goItin} />;
  else if (route.screen === 'stop') screen = (
    <StopDetailScreen
      stopId={route.stopId}
      dayId={route.dayId}
      onBack={(nextStopId) => {
        if (typeof nextStopId === 'string') {
          goStop(nextStopId, route.dayId);
        } else {
          goDay(route.dayId);
        }
      }}
    />
  );

  return (
    <div style={{ background: VA.paper, minHeight: '100dvh' }}>
      {screen}
      <div style={{
        position: 'fixed', bottom: 0, left: 0, right: 0, zIndex: 55,
        maxWidth: 440, margin: '0 auto',
      }}>
        <TabBar active={activeTab} onTab={onTab} />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
